<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=640, height=480, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Athathi Technician</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="apple-touch-icon" href="/static/logo.svg">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <!-- New SPA mounts here.  Step 8: login + top bar + placeholder screens. -->
    <div id="app-root"></div>

    <!--
      Legacy recording / calibration / sessions DOM. Step 8 keeps it intact
      (and hidden) so:
        * `LegacyApp.connectSSE / loadSessions / startRecording / ...` keep
           working when called from later steps,
        * tests / agents that string-search for the load-bearing IDs
           (#btn-start, #sessions-list, #preview-img, ...) still find them.
      Steps 9-10 will progressively absorb each card into the new screens.
    -->
    <div id="legacy-root" data-legacy="true" hidden>
        <h1>LiDAR SLAM Recorder</h1>

        <!-- Status Card -->
        <div class="card">
            <h2>System Status</h2>
            <div class="card-body" id="status-panel">
                <div class="status-row">
                    <span class="status-label">Network</span>
                    <span class="status-value" id="s-network">checking...</span>
                </div>
                <div class="status-row">
                    <span class="status-label">LiDAR</span>
                    <span class="status-value" id="s-lidar">checking...</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Camera</span>
                    <span class="status-value" id="s-camera">checking...</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Calibration</span>
                    <span class="status-value" id="s-calib">checking...</span>
                </div>
                <div class="status-row">
                    <span class="status-label">State</span>
                    <span class="status-value" id="s-state">idle</span>
                </div>
                <div id="camera-preview" style="margin-top:6px">
                    <img id="preview-img" src="/api/camera/preview"
                         style="width:100%; border-radius:6px; display:none">
                </div>
            </div>
        </div>

        <!-- Calibration Card -->
        <div class="card" id="calib-card">
            <h2>Calibration</h2>
            <div class="card-body">
                <div style="display:flex; gap:6px; flex-wrap:wrap">
                    <button class="btn-process" id="btn-calib-intr">
                        Calibrate Camera
                    </button>
                    <button class="btn-process" id="btn-calib-stop" style="display:none">
                        Stop Calibration
                    </button>
                </div>
                <div id="calib-progress" class="slam-progress" style="display:none"></div>
                <div id="calib-status" style="font-size:0.8em; color:#888; margin-top:4px"></div>
                <div style="margin-top:8px">
                    <button class="btn-process" id="btn-calib-extr">
                        Set Extrinsics (Manual)
                    </button>
                    <div id="extr-status" style="font-size:0.8em; color:#888; margin-top:4px"></div>
                </div>
            </div>
        </div>

        <!-- Recording Card -->
        <div class="card">
            <h2>Record</h2>
            <div class="card-body">
                <div id="recording-banner" style="display:none">
                    <div class="recording-indicator">
                        <div class="recording-dot"></div>
                        <span>Recording</span>
                        <span class="timer" id="rec-timer">0:00</span>
                    </div>
                    <div id="rec-camera-status" style="font-size:0.85em; margin-top:4px;"></div>
                </div>
                <input type="text" class="session-name" id="session-name"
                       placeholder="Session name (optional)">
                <button class="btn btn-record" id="btn-start">
                    Start Recording
                </button>
                <button class="btn btn-stop" id="btn-stop" style="display:none">
                    Stop Recording
                </button>
            </div>
        </div>

        <!-- Sessions Card -->
        <div class="card">
            <h2>Sessions</h2>
            <div class="card-body" id="sessions-list">
                <div class="empty">No recordings yet</div>
            </div>
        </div>
    </div>

    <!-- Legacy JS first (defines window.LegacyApp), then SPA shell. -->
    <script src="/static/legacy_app.js"></script>
    <script src="/static/app.js"></script>

    <!--
      Wire the legacy buttons that used inline onclick="..." in the old
      template. We keep their IDs but bind via addEventListener now that
      the inline handlers are namespaced inside LegacyApp.
    -->
    <script>
        (function () {
            var bindings = [
                ['btn-calib-intr', 'startIntrinsicCalib'],
                ['btn-calib-stop', 'stopIntrinsicCalib'],
                ['btn-calib-extr', 'setExtrinsicsManual'],
                ['btn-start',      'startRecording'],
                ['btn-stop',       'stopRecording'],
            ];
            for (var i = 0; i < bindings.length; i++) {
                (function (id, fn) {
                    var elNode = document.getElementById(id);
                    if (elNode) {
                        elNode.addEventListener('click', function () {
                            if (window.LegacyApp && typeof window.LegacyApp[fn] === 'function') {
                                window.LegacyApp[fn]();
                            }
                        });
                    }
                })(bindings[i][0], bindings[i][1]);
            }
        })();
    </script>
</body>
</html>
