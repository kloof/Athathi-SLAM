<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiDAR SLAM Recorder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { font-size: 14px; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 8px; margin: 0; overflow-x: hidden; }
        h1 { font-size: 1.2em; margin-bottom: 8px; color: #e94560; }
        h2 { font-size: 1em; margin-bottom: 0; color: #0f3460; background: #e94560; padding: 6px 10px; border-radius: 6px 6px 0 0; }

        .card { background: #16213e; border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
        .card-body { padding: 8px; }

        .status-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1a1a2e; }
        .status-row:last-child { border: none; }
        .status-label { color: #888; }
        .status-value { font-weight: 600; }
        .ok { color: #4ecca3; }
        .warn { color: #f0a500; }
        .err { color: #e94560; }

        /* Touch-friendly buttons: min 44px tap target */
        .btn { display: inline-block; padding: 14px 24px; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; cursor: pointer; transition: opacity 0.2s; width: 100%; margin-bottom: 6px; min-height: 48px; }
        .btn:disabled { opacity: 0.4; }
        .btn:active { opacity: 0.7; }
        .btn-record { background: #e94560; color: #fff; }
        .btn-stop { background: #f0a500; color: #1a1a2e; }
        .btn-delete { background: none; color: #e94560; border: 1px solid #e94560; font-size: 0.85em; padding: 8px 14px; width: auto; margin: 0; min-height: 44px; }
        .btn-process { background: #4ecca3; color: #1a1a2e; font-size: 0.85em; padding: 8px 14px; width: auto; margin: 0; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; min-height: 44px; }
        .btn-process:disabled { opacity: 0.4; }

        .slam-progress { font-size: 0.85em; color: #f0a500; margin-top: 4px; }
        .slam-error { font-size: 0.85em; color: #e94560; margin-top: 4px; }

        .badge { display: inline-block; font-size: 0.75em; padding: 3px 8px; border-radius: 4px; font-weight: 600; margin-left: 6px; vertical-align: middle; }
        .badge-cancelled { background: rgba(240, 165, 0, 0.18); color: #f0a500; border: 1px solid #f0a500; }

        .result-block { margin-top: 8px; padding: 8px; background: #1a1a2e; border-radius: 6px; }
        .metrics-row { display: flex; flex-wrap: wrap; gap: 6px 12px; font-size: 0.8em; color: #4ecca3; margin-bottom: 8px; }
        .metrics-row span { white-space: nowrap; }

        .floorplan-svg { width: 100%; height: auto; background: #0f1525; border-radius: 4px; display: block; }
        .floorplan-svg .wall { stroke: #4ecca3; stroke-linecap: square; }
        .floorplan-svg .door-arc { fill: none; stroke: #f0a500; stroke-width: 0.03; }
        .floorplan-svg .door-stop { stroke: #f0a500; stroke-width: 0.05; stroke-linecap: square; }
        .floorplan-svg .window { stroke: #0f3460; stroke-linecap: square; }
        .floorplan-svg .furn { stroke: #e94560; fill: rgba(233,69,96,0.15); cursor: pointer; }
        .floorplan-svg .furn-label { font-size: 0.18px; fill: #eee; pointer-events: none; }

        .gallery-title { font-size: 0.85em; color: #888; margin: 10px 0 4px; font-weight: 600; }
        .gallery-empty { font-size: 0.85em; color: #666; text-align: center; padding: 12px; }
        .gallery-class-group { margin-bottom: 10px; }
        .gallery-class-header { font-size: 0.8em; color: #f0a500; margin-bottom: 4px; font-weight: 600; }
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .gallery-card { background: #16213e; border-radius: 4px; overflow: hidden; padding: 4px; transition: outline 0.15s; outline: 2px solid transparent; }
        .gallery-card.flash { outline-color: #e94560; }
        .gallery-card img { width: 100%; border-radius: 3px; display: block; background: #0f1525; min-height: 60px; }
        .gallery-card .label { font-size: 0.75em; color: #4ecca3; margin-top: 2px; }
        .gallery-card .dist { font-size: 0.7em; color: #888; }

        .artifact-row { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
        .artifact-link { background: #0f3460; color: #eee; font-size: 0.78em; padding: 6px 10px; border-radius: 4px; text-decoration: none; min-height: 44px; display: inline-flex; align-items: center; }
        .artifact-link:active { opacity: 0.7; }

        .recording-indicator { display: flex; align-items: center; gap: 8px; padding: 10px; background: #e94560; border-radius: 6px; margin-bottom: 8px; font-weight: 600; }
        .recording-dot { width: 12px; height: 12px; background: #fff; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .session-item { padding: 8px; border-bottom: 1px solid #1a1a2e; }
        .session-item:last-child { border: none; }
        .session-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .session-name-text { font-weight: 600; color: #4ecca3; font-size: 0.95em; }
        .session-meta { font-size: 0.75em; color: #888; margin-top: 2px; }
        .session-scp { font-size: 0.7em; color: #666; margin-top: 2px; font-family: monospace; word-break: break-all; }
        .empty { color: #666; padding: 16px; text-align: center; }
        .timer { font-size: 1.4em; font-variant-numeric: tabular-nums; }

        .session-name { display: block; width: 100%; padding: 10px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #eee; font-size: 1em; margin-bottom: 6px; }
    </style>
</head>
<body>
    <h1>LiDAR SLAM Recorder</h1>

    <!-- Status Card -->
    <div class="card">
        <h2>System Status</h2>
        <div class="card-body" id="status-panel">
            <div class="status-row">
                <span class="status-label">Network</span>
                <span class="status-value" id="s-network">checking...</span>
            </div>
            <div class="status-row">
                <span class="status-label">LiDAR</span>
                <span class="status-value" id="s-lidar">checking...</span>
            </div>
            <div class="status-row">
                <span class="status-label">Camera</span>
                <span class="status-value" id="s-camera">checking...</span>
            </div>
            <div class="status-row">
                <span class="status-label">Calibration</span>
                <span class="status-value" id="s-calib">checking...</span>
            </div>
            <div class="status-row">
                <span class="status-label">State</span>
                <span class="status-value" id="s-state">idle</span>
            </div>
            <div id="camera-preview" style="margin-top:6px">
                <img id="preview-img" src="/api/camera/preview"
                     style="width:100%; border-radius:6px; display:none"
                     onerror="this.style.display='none'; previewErrors++"
                     onload="this.style.display='block'; previewErrors=0">
            </div>
        </div>
    </div>

    <!-- Calibration Card -->
    <div class="card" id="calib-card">
        <h2>Calibration</h2>
        <div class="card-body">
            <div style="display:flex; gap:6px; flex-wrap:wrap">
                <button class="btn-process" id="btn-calib-intr" onclick="startIntrinsicCalib()">
                    Calibrate Camera
                </button>
                <button class="btn-process" id="btn-calib-stop" onclick="stopIntrinsicCalib()" style="display:none">
                    Stop Calibration
                </button>
            </div>
            <div id="calib-progress" class="slam-progress" style="display:none"></div>
            <div id="calib-status" style="font-size:0.8em; color:#888; margin-top:4px"></div>
            <div style="margin-top:8px">
                <button class="btn-process" id="btn-calib-extr" onclick="setExtrinsicsManual()">
                    Set Extrinsics (Manual)
                </button>
                <div id="extr-status" style="font-size:0.8em; color:#888; margin-top:4px"></div>
            </div>
        </div>
    </div>

    <!-- Recording Card -->
    <div class="card">
        <h2>Record</h2>
        <div class="card-body">
            <div id="recording-banner" style="display:none">
                <div class="recording-indicator">
                    <div class="recording-dot"></div>
                    <span>Recording</span>
                    <span class="timer" id="rec-timer">0:00</span>
                </div>
                <div id="rec-camera-status" style="font-size:0.85em; margin-top:4px;"></div>
            </div>
            <input type="text" class="session-name" id="session-name"
                   placeholder="Session name (optional)">
            <button class="btn btn-record" id="btn-start" onclick="startRecording()">
                Start Recording
            </button>
            <button class="btn btn-stop" id="btn-stop" onclick="stopRecording()" style="display:none">
                Stop Recording
            </button>
        </div>
    </div>

    <!-- Sessions Card -->
    <div class="card">
        <h2>Sessions</h2>
        <div class="card-body" id="sessions-list">
            <div class="empty">No recordings yet</div>
        </div>
    </div>

    <script>
        let evtSource = null;
        let isRecording = false;
        let processingStates = {};
        let previewErrors = 0;
        // Cache the result envelope per session, so we don't refetch on every loadSessions().
        const resultCache = {};
        // Track which sessions have a result-fetch in flight, to avoid duplicate hits.
        const resultInFlight = {};

        // --- SSE ---
        function connectSSE() {
            if (evtSource) evtSource.close();
            evtSource = new EventSource('/api/events');
            evtSource.onmessage = (e) => {
                const d = JSON.parse(e.data);
                updateRecordingUI(d);
                updateProcessingUI(d.processing || {});
            };
            evtSource.onerror = () => {
                evtSource.close();
                setTimeout(connectSSE, 3000);
            };
        }

        function updateProcessingUI(processing) {
            const wasProcessing = Object.keys(processingStates);
            const nowProcessing = Object.keys(processing);
            let needRefresh = false;

            // Refresh if something finished or stage changed.
            for (const sid of wasProcessing) {
                if (!nowProcessing.includes(sid)) {
                    needRefresh = true;
                } else {
                    const before = processingStates[sid];
                    const now = processing[sid];
                    if (before.status !== now.status || before.stage !== now.stage) {
                        needRefresh = true;
                    }
                }
            }

            processingStates = processing;
            if (needRefresh) loadSessions();

            // Update inline progress lines.
            for (const [sid, info] of Object.entries(processing)) {
                const el = document.getElementById(`slam-progress-${sid}`);
                if (el) {
                    const mins = Math.floor(info.elapsed / 60);
                    const secs = Math.floor(info.elapsed % 60);
                    const stage = info.stage || info.progress || info.status || 'working';
                    el.textContent = `Processing — ${stage} (${mins}:${secs.toString().padStart(2, '0')})`;
                }
            }
        }

        function updateRecordingUI(d) {
            const banner = document.getElementById('recording-banner');
            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');
            const nameInput = document.getElementById('session-name');
            const timer = document.getElementById('rec-timer');
            const stateEl = document.getElementById('s-state');

            if (d.recording) {
                isRecording = true;
                banner.style.display = 'block';
                btnStart.style.display = 'none';
                btnStop.style.display = 'block';
                nameInput.disabled = true;
                const mins = Math.floor(d.elapsed / 60);
                const secs = Math.floor(d.elapsed % 60);
                timer.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                stateEl.textContent = d.status || 'recording';
                stateEl.className = 'status-value warn';

                const camStatus = document.getElementById('rec-camera-status');
                if (d.camera_recording === null || d.camera_recording === undefined) {
                    camStatus.textContent = '';
                } else if (d.camera_recording) {
                    camStatus.textContent = `Camera: streaming (${d.camera_frames} frames)`;
                    camStatus.style.color = '#4ade80';
                } else {
                    camStatus.textContent = 'Camera: NOT STREAMING — stop and check the device';
                    camStatus.style.color = '#f87171';
                }
            } else {
                if (isRecording) {
                    isRecording = false;
                    loadSessions();
                }
                banner.style.display = 'none';
                btnStart.style.display = 'block';
                btnStart.disabled = false;
                btnStop.style.display = 'none';
                nameInput.disabled = false;
                stateEl.textContent = 'idle';
                stateEl.className = 'status-value ok';
            }
        }

        // --- API calls ---
        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();

                const netEl = document.getElementById('s-network');
                netEl.textContent = d.network.ok ? 'OK' : 'Error';
                netEl.className = 'status-value ' + (d.network.ok ? 'ok' : 'err');

                const lidarEl = document.getElementById('s-lidar');
                lidarEl.textContent = d.lidar_reachable ? 'Connected' : 'Not reachable';
                lidarEl.className = 'status-value ' + (d.lidar_reachable ? 'ok' : 'warn');

                const camEl = document.getElementById('s-camera');
                if (d.camera) {
                    camEl.textContent = d.camera.ok ? d.camera.message : 'Not connected';
                    camEl.className = 'status-value ' + (d.camera.ok ? 'ok' : 'warn');
                    if (d.camera.ok) previewErrors = 0;
                }

                const calibEl = document.getElementById('s-calib');
                const intrOk = d.calibrated && d.calibrated.intrinsics;
                const extOk = d.calibrated && d.calibrated.extrinsics;
                calibEl.textContent = intrOk && extOk ? 'Ready' : intrOk ? 'Intrinsics only' : 'Not calibrated';
                calibEl.className = 'status-value ' + (intrOk && extOk ? 'ok' : 'warn');

                // Hide preview during recording
                const previewImg = document.getElementById('preview-img');
                if (d.recording) {
                    previewImg.style.display = 'none';
                    previewImg.src = '';
                } else if (!previewImg.src.includes('/api/camera/preview') && previewErrors < 3) {
                    previewImg.src = '/api/camera/preview';
                }

                document.getElementById('calib-card').style.display = d.camera.ok ? 'block' : 'none';
            } catch (e) {
                document.getElementById('s-network').textContent = 'Fetch error';
            }
        }

        async function startRecording() {
            const name = document.getElementById('session-name').value.trim() || undefined;
            const btnStart = document.getElementById('btn-start');
            btnStart.disabled = true;

            try {
                const res = await fetch('/api/record/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name}),
                });
                const d = await res.json();
                if (!res.ok) {
                    alert(d.error || 'Failed to start');
                    btnStart.disabled = false;
                }
            } catch (e) {
                alert('Network error: ' + e.message);
                btnStart.disabled = false;
            }
        }

        async function stopRecording() {
            const btnStop = document.getElementById('btn-stop');
            btnStop.disabled = true;

            try {
                const res = await fetch('/api/record/stop', {method: 'POST'});
                const d = await res.json();
                if (!res.ok) alert(d.error || 'Failed to stop');
                loadSessions();
                checkStatus();
            } catch (e) {
                alert('Network error: ' + e.message);
            } finally {
                btnStop.disabled = false;
            }
        }

        async function processSession(id) {
            const btn = document.getElementById(`btn-process-${id}`);
            if (btn) btn.disabled = true;

            // Wipe any cached result so we refetch after the new run finishes.
            delete resultCache[id];

            try {
                const res = await fetch(`/api/session/${id}/process`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({}),
                });
                const d = await res.json();
                if (!res.ok) {
                    alert(d.error || 'Failed to start processing');
                    if (btn) btn.disabled = false;
                }
                loadSessions();
            } catch (e) {
                alert('Network error: ' + e.message);
                if (btn) btn.disabled = false;
            }
        }

        async function deleteSession(id) {
            if (!confirm('Delete this recording?')) return;
            try {
                await fetch(`/api/session/${id}`, {method: 'DELETE'});
                delete resultCache[id];
                loadSessions();
            } catch (e) {
                alert('Failed to delete');
            }
        }

        // ---------- Result envelope rendering ----------

        async function fetchResult(sessionId) {
            if (resultCache[sessionId] || resultInFlight[sessionId]) return;
            resultInFlight[sessionId] = true;
            try {
                const res = await fetch(`/api/session/${sessionId}/result`);
                if (!res.ok) {
                    console.warn(`result fetch failed for ${sessionId}: ${res.status}`);
                    return;
                }
                const data = await res.json();
                if (data && data.result) {
                    resultCache[sessionId] = data.result;
                    // Re-render to inject the freshly fetched envelope.
                    loadSessions();
                }
            } catch (e) {
                console.warn(`result fetch error for ${sessionId}:`, e);
            } finally {
                delete resultInFlight[sessionId];
            }
        }

        function renderFloorplanSvg(sessionId, envelope) {
            const fp = envelope.floorplan || {};
            const walls = fp.walls || [];
            const doors = fp.doors || [];
            const windows = fp.windows || [];
            const furniture = envelope.furniture || [];

            if (!walls.length) {
                const empty = document.createElement('div');
                empty.className = 'gallery-empty';
                empty.textContent = 'No walls in result';
                return empty;
            }

            // Compute extents over walls.
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const w of walls) {
                for (const p of [w.start, w.end]) {
                    if (p[0] < minX) minX = p[0];
                    if (p[0] > maxX) maxX = p[0];
                    if (p[1] < minY) minY = p[1];
                    if (p[1] > maxY) maxY = p[1];
                }
            }
            const pad = 0.5;
            minX -= pad; minY -= pad; maxX += pad; maxY += pad;
            const w = maxX - minX;
            const h = maxY - minY;

            const svgNs = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNs, 'svg');
            svg.setAttribute('class', 'floorplan-svg');
            // Account for the y-flip: viewBox spans the same world rect, but we
            // flip inside a wrapping <g> so +Y points up on screen.
            svg.setAttribute('viewBox', `${minX} ${-maxY} ${w} ${h}`);
            svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

            const flipG = document.createElementNS(svgNs, 'g');
            flipG.setAttribute('transform', 'scale(1,-1)');
            svg.appendChild(flipG);

            // Build a wall lookup so doors/windows can find their parent.
            const wallById = {};
            for (const wl of walls) wallById[wl.id] = wl;

            // Helper: parent wall direction (unit vector) and length.
            function wallDir(wl) {
                const dx = wl.end[0] - wl.start[0];
                const dy = wl.end[1] - wl.start[1];
                const len = Math.hypot(dx, dy) || 1;
                return { dx: dx/len, dy: dy/len, len };
            }

            // Walls as plain line segments. We draw doors as gaps by overlaying
            // a black "cut" segment on top of the wall — simpler and reliable.
            for (const wl of walls) {
                const line = document.createElementNS(svgNs, 'line');
                line.setAttribute('x1', wl.start[0]);
                line.setAttribute('y1', wl.start[1]);
                line.setAttribute('x2', wl.end[0]);
                line.setAttribute('y2', wl.end[1]);
                line.setAttribute('class', 'wall');
                line.setAttribute('stroke-width', '0.05');
                flipG.appendChild(line);
            }

            // Doors: cut a gap on the parent wall, plus an arc indicator.
            for (const dr of doors) {
                const wl = wallById[dr.wall];
                if (!wl) continue;
                const { dx, dy } = wallDir(wl);
                const halfW = (dr.width || 0.8) / 2;
                const cx = dr.center[0], cy = dr.center[1];
                // Erase the gap on the wall by drawing a thicker segment in bg color.
                const gap = document.createElementNS(svgNs, 'line');
                gap.setAttribute('x1', cx - dx * halfW);
                gap.setAttribute('y1', cy - dy * halfW);
                gap.setAttribute('x2', cx + dx * halfW);
                gap.setAttribute('y2', cy + dy * halfW);
                gap.setAttribute('stroke', '#0f1525');
                gap.setAttribute('stroke-width', '0.07');
                flipG.appendChild(gap);

                // Stop marker on one side of the opening.
                const stop = document.createElementNS(svgNs, 'line');
                stop.setAttribute('x1', cx - dx * halfW);
                stop.setAttribute('y1', cy - dy * halfW);
                stop.setAttribute('x2', cx - dx * halfW + (-dy) * 0.05);
                stop.setAttribute('y2', cy - dy * halfW + (dx) * 0.05);
                stop.setAttribute('class', 'door-stop');
                flipG.appendChild(stop);

                // Arc indicating swing. Start at one jamb, sweep to the perpendicular.
                const sx = cx - dx * halfW;
                const sy = cy - dy * halfW;
                const r = dr.width || 0.8;
                // End point: r along the perpendicular direction (-dy, dx) from sx,sy.
                const ex = sx + (-dy) * r;
                const ey = sy + (dx) * r;
                const arc = document.createElementNS(svgNs, 'path');
                arc.setAttribute('d', `M ${sx} ${sy} A ${r} ${r} 0 0 1 ${ex} ${ey}`);
                arc.setAttribute('class', 'door-arc');
                flipG.appendChild(arc);
            }

            // Windows: thicker double line on parent wall.
            for (const wn of windows) {
                const wl = wallById[wn.wall];
                if (!wl) continue;
                const { dx, dy } = wallDir(wl);
                const halfW = (wn.width || 1.0) / 2;
                const cx = wn.center[0], cy = wn.center[1];
                // Inner light line
                const inner = document.createElementNS(svgNs, 'line');
                inner.setAttribute('x1', cx - dx * halfW);
                inner.setAttribute('y1', cy - dy * halfW);
                inner.setAttribute('x2', cx + dx * halfW);
                inner.setAttribute('y2', cy + dy * halfW);
                inner.setAttribute('class', 'window');
                inner.setAttribute('stroke-width', '0.12');
                flipG.appendChild(inner);
                const inner2 = document.createElementNS(svgNs, 'line');
                inner2.setAttribute('x1', cx - dx * halfW);
                inner2.setAttribute('y1', cy - dy * halfW);
                inner2.setAttribute('x2', cx + dx * halfW);
                inner2.setAttribute('y2', cy + dy * halfW);
                inner2.setAttribute('stroke', '#4ecca3');
                inner2.setAttribute('stroke-width', '0.04');
                flipG.appendChild(inner2);
            }

            // Furniture: rotated rects per item.
            for (const f of furniture) {
                const cx = f.center[0], cy = f.center[1];
                const w0 = (f.size && f.size[0]) || 0.3;
                const d0 = (f.size && f.size[1]) || 0.3;
                const yawRad = f.yaw || 0;
                const yawDeg = yawRad * 180 / Math.PI;
                const rect = document.createElementNS(svgNs, 'rect');
                rect.setAttribute('x', -w0 / 2);
                rect.setAttribute('y', -d0 / 2);
                rect.setAttribute('width', w0);
                rect.setAttribute('height', d0);
                rect.setAttribute('class', 'furn');
                rect.setAttribute('stroke-width', '0.03');
                rect.setAttribute('transform', `translate(${cx} ${cy}) rotate(${yawDeg})`);
                rect.addEventListener('click', () => {
                    const targetId = `bbox-${f.id}-${sessionId}`;
                    const el = document.getElementById(targetId);
                    if (el) {
                        el.scrollIntoView({behavior: 'smooth', block: 'center'});
                        el.classList.add('flash');
                        setTimeout(() => el.classList.remove('flash'), 1200);
                    }
                });
                flipG.appendChild(rect);
            }

            return svg;
        }

        function renderGallery(sessionId, envelope) {
            const wrap = document.createElement('div');
            const items = envelope.best_images || [];

            const title = document.createElement('div');
            title.className = 'gallery-title';
            title.textContent = `Furniture (${items.length})`;
            wrap.appendChild(title);

            if (items.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'gallery-empty';
                empty.textContent = 'No objects detected';
                wrap.appendChild(empty);
                return wrap;
            }

            // Group by class while remembering original index (used for img URL).
            const groups = {};
            items.forEach((it, idx) => {
                const cls = it.class || 'unknown';
                (groups[cls] = groups[cls] || []).push({ it, idx });
            });

            for (const cls of Object.keys(groups).sort()) {
                const group = document.createElement('div');
                group.className = 'gallery-class-group';

                const header = document.createElement('div');
                header.className = 'gallery-class-header';
                header.textContent = `${cls} (${groups[cls].length})`;
                group.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'gallery-grid';

                for (const { it, idx } of groups[cls]) {
                    const card = document.createElement('div');
                    card.className = 'gallery-card';
                    card.id = `bbox-${it.bbox_id}-${sessionId}`;

                    const img = document.createElement('img');
                    img.src = `/api/session/${sessionId}/best_view/${idx}.jpg`;
                    img.alt = `${cls} ${idx}`;
                    img.loading = 'lazy';
                    img.onerror = () => { img.style.display = 'none'; };
                    card.appendChild(img);

                    const label = document.createElement('div');
                    label.className = 'label';
                    label.textContent = cls;
                    card.appendChild(label);

                    const dist = document.createElement('div');
                    dist.className = 'dist';
                    const dm = (it.camera_distance_m != null) ? it.camera_distance_m.toFixed(2) : '?';
                    dist.textContent = `${dm} m`;
                    card.appendChild(dist);

                    grid.appendChild(card);
                }

                group.appendChild(grid);
                wrap.appendChild(group);
            }

            return wrap;
        }

        function renderResultBlock(sessionId, envelope) {
            const block = document.createElement('div');
            block.className = 'result-block';

            // Headline metrics row.
            const slamMx = (envelope.metrics && envelope.metrics.slam) || {};
            const totalDur = envelope.metrics && envelope.metrics.total_duration_s;
            const bbox = slamMx.bounding_box_m || [];
            const bboxStr = (bbox.length === 3)
                ? `${bbox[0].toFixed(1)} x ${bbox[1].toFixed(1)} x ${bbox[2].toFixed(1)} m`
                : '';
            const traj = (typeof slamMx.trajectory_length_m === 'number')
                ? slamMx.trajectory_length_m.toFixed(1) : '?';
            const frames = (slamMx.num_frames != null) ? slamMx.num_frames : '?';

            const metricsRow = document.createElement('div');
            metricsRow.className = 'metrics-row';
            metricsRow.innerHTML = ''
                + `<span>${frames} frames</span>`
                + (bboxStr ? `<span>${bboxStr}</span>` : '')
                + `<span>${traj} m walked</span>`
                + (totalDur != null ? `<span>${totalDur} s total</span>` : '');
            block.appendChild(metricsRow);

            // Floor plan SVG.
            const svg = renderFloorplanSvg(sessionId, envelope);
            block.appendChild(svg);

            // Furniture gallery.
            const gallery = renderGallery(sessionId, envelope);
            block.appendChild(gallery);

            // Artifact links.
            const artRow = document.createElement('div');
            artRow.className = 'artifact-row';
            const artifacts = [
                ['colored_map.ply', 'Open colored map (PLY)'],
                ['scene_with_boxes.ply', 'Open scene+boxes (PLY)'],
                ['result.json', 'Open result.json'],
            ];
            for (const [name, label] of artifacts) {
                const a = document.createElement('a');
                a.className = 'artifact-link';
                a.href = `/api/session/${sessionId}/artifact/${name}`;
                a.textContent = label;
                a.target = '_blank';
                a.rel = 'noopener';
                artRow.appendChild(a);
            }
            block.appendChild(artRow);

            return block;
        }

        // ---------- Sessions list ----------

        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                const sessions = await res.json();
                const container = document.getElementById('sessions-list');

                if (!sessions.length) {
                    container.innerHTML = '<div class="empty">No recordings yet</div>';
                    return;
                }

                container.innerHTML = '';
                sessions.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'session-item';

                    const header = document.createElement('div');
                    header.className = 'session-header';
                    header.style.gap = '8px';
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'session-name-text';
                    nameSpan.textContent = s.name;

                    // Cancelled badge inline with the name.
                    if (s.slam_status === 'cancelled') {
                        const badge = document.createElement('span');
                        badge.className = 'badge badge-cancelled';
                        badge.textContent = 'Cancelled';
                        nameSpan.appendChild(badge);
                    }

                    const btnGroup = document.createElement('div');
                    btnGroup.style.display = 'flex';
                    btnGroup.style.gap = '6px';
                    btnGroup.style.alignItems = 'center';

                    const procInfo = processingStates[s.id];
                    const isProcessing = !!procInfo;
                    const terminal = ['done', 'error', 'cancelled'];
                    const canStart = (s.status === 'stopped' || s.status === 'processed') && !isProcessing && s.bag_size;
                    const canReprocess = canStart && terminal.includes(s.slam_status);
                    const canFirstProcess = canStart && !s.slam_status;

                    if (canFirstProcess) {
                        const procBtn = document.createElement('button');
                        procBtn.className = 'btn-process';
                        procBtn.id = `btn-process-${s.id}`;
                        procBtn.textContent = 'Process';
                        procBtn.onclick = () => processSession(s.id);
                        btnGroup.appendChild(procBtn);
                    } else if (canReprocess) {
                        const reBtn = document.createElement('button');
                        reBtn.className = 'btn-process';
                        reBtn.id = `btn-process-${s.id}`;
                        reBtn.textContent = 'Re-process';
                        reBtn.onclick = () => processSession(s.id);
                        btnGroup.appendChild(reBtn);
                    }

                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn btn-delete';
                    delBtn.textContent = 'Delete';
                    delBtn.onclick = () => deleteSession(s.id);
                    btnGroup.appendChild(delBtn);

                    header.appendChild(nameSpan);
                    header.appendChild(btnGroup);

                    const meta = document.createElement('div');
                    meta.className = 'session-meta';
                    const created = s.created ? new Date(s.created).toLocaleString() : '';
                    const dur = s.duration ? s.duration + 's' : '';
                    const size = s.bag_size || 'no data';
                    const summary = s.result_summary;
                    let summaryHtml = '';
                    if (summary) {
                        summaryHtml = ` | <span class="ok">`
                            + `${summary.num_walls || 0} walls, `
                            + `${summary.num_doors || 0} doors, `
                            + `${summary.num_windows || 0} windows, `
                            + `${summary.num_furniture || 0} objects`
                            + `</span>`;
                    }
                    meta.innerHTML = `${created} | ${dur} | ${size} | <span class="${s.status === 'error' ? 'err' : 'ok'}">${s.status}</span>${summaryHtml}`;

                    const scp = document.createElement('div');
                    scp.className = 'session-scp';
                    scp.textContent = `scp -r talal@${location.hostname}:${s.scp_path} .`;

                    item.appendChild(header);
                    item.appendChild(meta);
                    item.appendChild(scp);

                    // Single stage-based progress line while a job is active.
                    if (isProcessing) {
                        const prog = document.createElement('div');
                        prog.className = 'slam-progress';
                        prog.id = `slam-progress-${s.id}`;
                        const mins = Math.floor((procInfo.elapsed || 0) / 60);
                        const secs = Math.floor((procInfo.elapsed || 0) % 60);
                        const stage = procInfo.stage || procInfo.progress || procInfo.status || 'working';
                        prog.textContent = `Processing — ${stage} (${mins}:${secs.toString().padStart(2, '0')})`;
                        item.appendChild(prog);
                    }

                    // Error line when SLAM failed.
                    if (s.slam_status === 'error' && s.slam_error) {
                        const errDiv = document.createElement('div');
                        errDiv.className = 'slam-error';
                        errDiv.textContent = `Processing error: ${s.slam_error}`;
                        item.appendChild(errDiv);
                    }

                    // Done: render full result envelope (lazy-fetch with cache).
                    if (s.slam_status === 'done') {
                        const envelope = resultCache[s.id];
                        if (envelope) {
                            item.appendChild(renderResultBlock(s.id, envelope));
                        } else {
                            const placeholder = document.createElement('div');
                            placeholder.className = 'slam-progress';
                            placeholder.textContent = 'Loading result...';
                            item.appendChild(placeholder);
                            // Kick off the fetch (will re-render via loadSessions on success).
                            fetchResult(s.id);
                        }
                    }

                    container.appendChild(item);
                });
            } catch (e) {
                console.error('Failed to load sessions', e);
            }
        }

        // --- Calibration ---
        async function startIntrinsicCalib() {
            try {
                const res = await fetch('/api/calibration/intrinsics/start', {method: 'POST'});
                const d = await res.json();
                if (!res.ok) { alert(d.error || 'Failed'); return; }
                document.getElementById('btn-calib-intr').style.display = 'none';
                document.getElementById('btn-calib-stop').style.display = 'inline-block';
                document.getElementById('calib-progress').style.display = 'block';
                document.getElementById('calib-progress').textContent = 'Hold checkerboard in front of camera...';
                pollCalibStatus();
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function stopIntrinsicCalib() {
            await fetch('/api/calibration/intrinsics/stop', {method: 'POST'});
            document.getElementById('btn-calib-intr').style.display = 'inline-block';
            document.getElementById('btn-calib-stop').style.display = 'none';
            document.getElementById('calib-progress').style.display = 'none';
        }

        async function pollCalibStatus() {
            try {
                const res = await fetch('/api/calibration/intrinsics/status');
                const d = await res.json();
                if (d.running) {
                    if (d.frames != null) {
                        document.getElementById('calib-progress').textContent =
                            d.frames + '/' + (d.target || 15) + ' frames captured';
                    }
                    setTimeout(pollCalibStatus, 2000);
                } else {
                    document.getElementById('btn-calib-intr').style.display = 'inline-block';
                    document.getElementById('btn-calib-stop').style.display = 'none';
                    document.getElementById('calib-progress').style.display = 'none';
                    if (d.calibrated) {
                        document.getElementById('calib-status').textContent = 'Intrinsics calibrated successfully';
                        document.getElementById('calib-status').style.color = '#4ecca3';
                    } else {
                        document.getElementById('calib-status').textContent = 'Calibration failed - try again';
                        document.getElementById('calib-status').style.color = '#e94560';
                    }
                    checkStatus();
                }
            } catch (e) { setTimeout(pollCalibStatus, 3000); }
        }

        async function setExtrinsicsManual() {
            const input = prompt(
                'Enter camera-to-LiDAR offset as: tx ty tz roll pitch yaw\n' +
                'Translation in meters, rotation in degrees\n' +
                'Example: 0.0 0.05 0.02 0 -90 0');
            if (!input) return;
            const parts = input.trim().split(/\s+/).map(Number);
            if (parts.length !== 6 || parts.some(isNaN)) {
                alert('Need 6 numbers: tx ty tz roll pitch yaw');
                return;
            }
            try {
                const res = await fetch('/api/calibration/extrinsics', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        translation: {x: parts[0], y: parts[1], z: parts[2]},
                        rotation: {x: 0, y: 0, z: 0, w: 1},
                        rpy_degrees: {roll: parts[3], pitch: parts[4], yaw: parts[5]}
                    }),
                });
                const d = await res.json();
                if (res.ok) {
                    document.getElementById('extr-status').textContent = 'Extrinsics saved';
                    document.getElementById('extr-status').style.color = '#4ecca3';
                    checkStatus();
                } else {
                    alert(d.error || 'Failed to save');
                }
            } catch (e) { alert('Error: ' + e.message); }
        }

        // --- Init ---
        checkStatus();
        loadSessions();
        connectSSE();
        setInterval(checkStatus, 10000);
    </script>
</body>
